<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ClawMart{% endblock %} — MCP Server Registry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #e2e0ff;
            min-height: 100vh;
        }
        a { color: #a5b4fc; text-decoration: none; }
        a:hover { color: #c7d2fe; text-decoration: underline; }

        /* Nav */
        .nav {
            background: linear-gradient(135deg, #0f0a2e, #1e1b4b);
            border-bottom: 1px solid #2d2654;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand {
            font-size: 20px;
            font-weight: 700;
            color: #e2e0ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand:hover { text-decoration: none; }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a {
            color: #8b85b1;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #e2e0ff; text-decoration: none; }
        .nav-links a.active { color: #a5b4fc; }

        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .btn:hover { opacity: 0.85; text-decoration: none; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-secondary { background: #1e1b4b; color: #a5b4fc; border: 1px solid #312e81; }
        .btn-ghost { background: transparent; color: #8b85b1; border: 1px solid #2d2654; }
        .btn-sm { font-size: 12px; padding: 5px 12px; }

        /* Footer */
        .footer {
            border-top: 1px solid #1e1b4b;
            padding: 24px 32px;
            text-align: center;
            color: #4a4570;
            font-size: 13px;
            margin-top: 60px;
        }
        .footer a { color: #6b6490; }

        /* Responsive */
        @media (max-width: 768px) {
            .nav { padding: 12px 16px; }
            .nav-links { gap: 14px; }
            .container { padding: 0 16px; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">&#129430; ClawMart</a>
        <div class="nav-links">
            <a href="/browse" class="{% if request.path == '/browse' %}active{% endif %}">Browse</a>
            <a href="/docs" class="{% if request.path == '/docs' %}active{% endif %}">API Docs</a>
            <a href="/submit" class="{% if request.path == '/submit' %}active{% endif %}">Submit</a>
            {% if session.get('admin') %}
            <a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">Admin</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    <div class="footer">
        <p>ClawMart &mdash; Agent-First MCP Server Registry &mdash; Built by <a href="https://engineroom-ai.com">Engine Room AI</a></p>
    </div>
</body>
</html>
